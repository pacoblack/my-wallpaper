<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全屏可折叠图片轮播器</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* 全屏轮播区域 */
        .slideshow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
            z-index: 2;

            /* 核心黑边填充技术：通过逗号分隔设置双层背景 */
            /* 1. 第一组（顶层）：用 contain 保证中间主图绝对不裁剪、比例完美 */
            /* 2. 第二组（底层）：用 100% 100% 将原图强行拉伸满全屏，无缝填满原本是黑边的区域 */
            background-size: contain, 100% 100%;
            
            /* 两层背景全部居中对齐 */
            background-position: center, center;

            background-repeat: repeat;
        }


        .slide.active {
            opacity: 1;
        }

        /* 控制面板 */
        .control-panel {
            position: fixed;
            bottom: 0;
            right: 0;
			margin-bottom: 40px;
            background: rgba(20, 20, 35, 0.92);
            backdrop-filter: blur(10px);
            border-radius: 20px 20px 0 0;
            padding: 20px;
            width: 100%;
            max-width: 800px;
            z-index: 10;
            box-shadow: 0 -5px 25px rgba(0, 0, 0, 0.5);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s ease;
        }

        .control-panel.collapsed {
            transform: translateY(calc(100%));
			margin-bottom: 50px;
        }

        .panel-toggle {
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 40px;
            background: rgba(20, 20, 35, 0.92);
            backdrop-filter: blur(10px);
            border-radius: 10px 10px 0 0;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 11;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
        }

        .panel-toggle i {
            font-size: 1.2rem;
            color: #4ecdc4;
            transition: transform 0.3s ease;
        }

        .control-panel.collapsed .panel-toggle i {
            transform: rotate(180deg);
        }

        .title {
            text-align: center;
            font-size: 1.6rem;
            margin-bottom: 15px;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .settings {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .setting-group {
            display: flex;
            flex-direction: column;
            min-width: 150px;
        }

        label {
            font-size: 0.9rem;
            margin-bottom: 8px;
            color: #a9a9c5;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        input {
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid #393953;
            background: #25253a;
            color: #fff;
            width: 100%;
        }

        input:focus {
            outline: none;
            border-color: #4ecdc4;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(45deg, #ff6b6b, #ff8e53);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 107, 107, 0.5);
        }

        .btn.secondary {
            background: linear-gradient(45deg, #4ecdc4, #43cea2);
            box-shadow: 0 4px 15px rgba(78, 205, 196, 0.3);
        }

        .btn.secondary:hover {
            box-shadow: 0 6px 20px rgba(78, 205, 196, 0.5);
        }

        /* 目录管理区域 */
        .directory-manager {
            margin-top: 15px;
            background: rgba(25, 25, 40, 0.7);
            border-radius: 12px;
            padding: 15px;
        }

        .directory-manager h3 {
            margin-bottom: 15px;
            color: #4ecdc4;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.1rem;
        }

        .directory-list {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 10px;
        }

        .directory-tag {
            background: rgba(255, 107, 107, 0.2);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .directory-tag .remove {
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        .directory-tag .remove:hover {
            opacity: 1;
        }

        .directory-actions {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            flex: 1;
        }

        .file-input-wrapper input[type=file] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .file-input-button {
            padding: 10px 15px;
            border-radius: 8px;
            background: #25253a;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            border: 1px dashed #4ecdc4;
            cursor: pointer;
            transition: all 0.3s;
        }

        .file-input-button:hover {
            background: rgba(78, 205, 196, 0.1);
        }

        /* 状态指示器 */
        .status {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(30, 30, 46, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 10px;
            padding: 10px 15px;
            z-index: 20;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #4ecdc4;
            box-shadow: 0 0 10px #4ecdc4;
        }

        /* 图片信息显示 */
        .image-info {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(30, 30, 46, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 10px;
            padding: 10px 15px;
            z-index: 5;
            font-size: 0.9rem;
            max-width: 300px;
            text-align: right;
            transition: opacity 0.3s;
        }

        .control-panel.collapsed + .image-info {
            opacity: 1;
        }

        .image-info.hidden {
            opacity: 0;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .control-panel {
                width: 100%;
                border-radius: 0;
                padding: 15px;
            }
            
            .control-panel.collapsed {
                transform: translateX(-50%) translateY(calc(100% - 40px));
            }
            
            .panel-toggle {
                top: -35px;
                width: 70px;
                height: 35px;
            }
            
            .title {
                font-size: 1.3rem;
            }
            
            .settings {
                flex-direction: column;
                align-items: center;
                gap: 15px;
            }
            
            .setting-group {
                width: 100%;
            }
            
            .buttons {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
                justify-content: center;
            }
            
            .directory-actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <!-- 全屏轮播区域 -->
    <div class="slideshow" id="slideshow"></div>
    
    <!-- 状态指示器 -->
    <div class="status">
        <div class="status-indicator"></div>
        <span>已加载 <span id="imageCount">0</span> 张图片</span>
    </div>
    
    <!-- 图片信息 -->
    <div class="image-info" id="imageInfo"></div>
    
    <!-- 控制面板 -->
    <div class="control-panel" id="controlPanel">
        <div class="panel-toggle" id="panelToggle">
            <i class="fas fa-chevron-down"></i>
        </div>
        
        <h2 class="title"><i class="fas fa-random"></i> 全屏图片轮播器</h2>
        
        <div class="settings">
            <div class="setting-group">
                <label for="interval"><i class="fas fa-clock"></i> 轮播间隔 (秒)</label>
                <input type="number" id="interval" min="2" max="600" value="60">
            </div>
            <div class="setting-group">
                <label for="transition"><i class="fas fa-exchange-alt"></i> 过渡时间 (秒)</label>
                <input type="number" id="transition" min="0.5" max="5" step="0.1" value="1.5">
            </div>
        </div>
        
        <div class="buttons">
            <button id="pauseBtn" class="btn">
                <i class="fas fa-pause"></i> 暂停轮播
            </button>
            <button id="prevBtn" class="btn secondary">
                <i class="fas fa-arrow-left"></i> 上一张
            </button>
            <button id="nextBtn" class="btn secondary">
                <i class="fas fa-arrow-right"></i> 下一张
            </button>
            <button id="shuffleBtn" class="btn">
                <i class="fas fa-random"></i> 重新随机
            </button>
        </div>
        
        <div class="directory-manager">
            <h3><i class="fas fa-folder"></i> 图片目录管理</h3>
            <div class="directory-list" id="directoryList">
                <!-- 目录标签将在这里动态生成 -->
            </div>
            
            <div class="directory-actions">
                <div class="file-input-wrapper">
                    <div class="file-input-button">
                        <i class="fas fa-folder-plus"></i> 添加图片目录
                    </div>
                    <input type="file" id="directoryInput" webkitdirectory directory multiple>
                </div>
                
                <button id="clearBtn" class="btn secondary">
                    <i class="fas fa-trash-alt"></i> 清除所有
                </button>
            </div>
        </div>
    </div>
	<script src="images.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // DOM元素
            const slideshow = document.getElementById('slideshow');
            const intervalInput = document.getElementById('interval');
            const transitionInput = document.getElementById('transition');
            const pauseBtn = document.getElementById('pauseBtn');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const shuffleBtn = document.getElementById('shuffleBtn');
            const directoryList = document.getElementById('directoryList');
            const directoryInput = document.getElementById('directoryInput');
            const clearBtn = document.getElementById('clearBtn');
            const imageCountElement = document.getElementById('imageCount');
            const controlPanel = document.getElementById('controlPanel');
            const panelToggle = document.getElementById('panelToggle');
            const imageInfo = document.getElementById('imageInfo');
            
            // 状态变量
            let currentSlide = 0;
            let slides = [];
            let intervalId = null;
            let isPaused = false;
            let imageFiles = [];
            let addedDirectories = new Set();
            let isPanelCollapsed = false;
            
            // 支持的图片格式
            const supportedFormats = ['jpg', 'jpeg', 'png', 'webp', 'gif', 'bmp'];
            
            // 初始化轮播器
            function initSlideshow() {
                slideshow.innerHTML = '';
                slides = [];
                
                // 数据安全校验
                if (typeof ALL_IMAGE_DATA === 'undefined' || ALL_IMAGE_DATA.length === 0) {
                    imageCountElement.textContent = "0";
                    imageInfo.classList.remove('hidden');
                    imageInfo.innerHTML = "<b style='color:#ff6b6b;'>未检测到数据！请确保已运行 refresh_list.py 脚本刷新图库。</b>";
                    return;
                }

                // 直接根据 Python 准备好的完整相对路径创建幻灯片
                ALL_IMAGE_DATA.forEach((imgObj, index) => {
                    const slide = document.createElement('div');
                    slide.className = 'slide';
                    
                    // 修复核心：直接使用原生字符路径，不再进行二次 URL 编码
                    slide.style.backgroundImage = `url('${imgObj.path}')`;
                    
                    slide.dataset.fileName = imgObj.name;
                    slide.dataset.index = index;
                    
                    slideshow.appendChild(slide);
                    slides.push(slide);
                });
                
                // 同步动画持续时长
                updateTransitionTime();
                
                // 打乱列表位置实现完全随机
                shuffleSlides();
                
                if (slides.length > 0) {
                    slides[0].classList.add('active'); // 修复上一版的小 Bug，确保第一张带 active
                    currentSlide = 0;
                    updateImageInfo();
                    startSlideshow();
                }
                
                imageCountElement.textContent = slides.length;
            }

            
            // 更新图片信息
            function updateImageInfo() {
                if (slides.length === 0) {
                    imageInfo.textContent = '';
                    return;
                }
                
                const currentSlideElement = slides[currentSlide];
                const fileName = currentSlideElement.dataset.fileName;
                const position = parseInt(currentSlideElement.dataset.index) + 1;
                
                //imageInfo.innerHTML = `
                //    <div>${fileName}</div>
                //    <div>${position} / ${slides.length}</div>
                //`;
            }
            
            // 更新图片计数
            function updateImageCount() {
                imageCountElement.textContent = imageFiles.length;
            }
            
            // 随机排序幻灯片
            function shuffleSlides() {
                for (let i = slides.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [slides[i], slides[j]] = [slides[j], slides[i]];
                    slideshow.appendChild(slides[i]);
                }
                
                // 更新索引
                slides.forEach((slide, index) => {
                    slide.dataset.index = index;
                });
            }
            
            // 开始轮播
            function startSlideshow() {
                if (intervalId) clearInterval(intervalId);
                
                const interval = parseInt(intervalInput.value) * 1000;
                intervalId = setInterval(() => {
                    if (!isPaused && slides.length > 0) {
                        nextSlide();
                    }
                }, interval);
            }
            
            // 下一张幻灯片
            function nextSlide() {
                if (slides.length === 0) return;
                
                slides[currentSlide].classList.remove('active');
                currentSlide = (currentSlide + 1) % slides.length;
                slides[currentSlide].classList.add('active');
                
                // 更新图片信息
                updateImageInfo();
                
                // 更新过渡时间
                updateTransitionTime();
            }
            
            // 上一张幻灯片
            function prevSlide() {
                if (slides.length === 0) return;
                
                slides[currentSlide].classList.remove('active');
                currentSlide = (currentSlide - 1 + slides.length) % slides.length;
                slides[currentSlide].classList.add('active');
                
                // 更新图片信息
                updateImageInfo();
                
                // 更新过渡时间
                updateTransitionTime();
            }
            
            // 更新过渡时间
            function updateTransitionTime() {
                const transitionTime = parseFloat(transitionInput.value);
                document.querySelectorAll('.slide').forEach(slide => {
                    slide.style.transition = `opacity ${transitionTime}s ease-in-out`;
                });
            }
            
            // 添加目录
            function addDirectory(files) {
                if (!files || files.length === 0) return;
                
                // 获取目录名（从第一个文件的webkitRelativePath中提取）
                const directoryName = files[0].webkitRelativePath.split('/')[0];
                
                // 检查目录是否已添加
                if (addedDirectories.has(directoryName)) {
                    alert(`目录 "${directoryName}" 已经添加过了！`);
                    return;
                }
                
                // 标记为已添加
                addedDirectories.add(directoryName);
                
                // 过滤图片文件
                let addedFiles = 0;
                for (let i = 0; i < files.length; i++) {
                    const file = files[i];
                    const extension = file.name.split('.').pop().toLowerCase();
                    
                    if (supportedFormats.includes(extension)) {
                        imageFiles.push(file);
                        addedFiles++;
                    }
                }
                
                if (addedFiles > 0) {
                    // 创建目录标签
                    const tag = document.createElement('div');
                    tag.className = 'directory-tag';
                    tag.innerHTML = `
                        <i class="fas fa-folder"></i> ${directoryName} (${addedFiles}张)
                        <span class="remove"><i class="fas fa-times"></i></span>
                    `;
                    directoryList.appendChild(tag);
                    
                    // 添加删除事件
                    tag.querySelector('.remove').addEventListener('click', function() {
                        removeDirectory(directoryName);
                        tag.remove();
                    });
                    
                    // 重新初始化轮播器
                    initSlideshow();
                } else {
                    alert(`目录 "${directoryName}" 中没有找到支持的图片文件！`);
                    addedDirectories.delete(directoryName);
                }
            }
            
            // 删除目录
            function removeDirectory(directoryName) {
                // 移除该目录下的所有图片文件
                imageFiles = imageFiles.filter(file => {
                    // 检查文件是否属于该目录
                    const fileDirectory = file.webkitRelativePath.split('/')[0];
                    return fileDirectory !== directoryName;
                });
                
                // 从已添加目录中移除
                addedDirectories.delete(directoryName);
                
                // 重新初始化轮播器
                initSlideshow();
            }
            
            // 清除所有目录
            function clearAllDirectories() {
                // 释放所有对象URL
                slides.forEach(slide => {
                    if (slide.dataset.objectUrl) {
                        URL.revokeObjectURL(slide.dataset.objectUrl);
                    }
                });
                
                // 重置所有状态
                imageFiles = [];
                addedDirectories.clear();
                directoryList.innerHTML = '';
                
                // 重新初始化轮播器
                initSlideshow();
            }
            
            // 切换控制面板
            function toggleControlPanel() {
                isPanelCollapsed = !isPanelCollapsed;
                controlPanel.classList.toggle('collapsed', isPanelCollapsed);
                imageInfo.classList.toggle('hidden', !isPanelCollapsed);
            }
            
            // 事件监听
            intervalInput.addEventListener('change', startSlideshow);
            transitionInput.addEventListener('change', updateTransitionTime);
            
            pauseBtn.addEventListener('click', function() {
                if (imageFiles.length === 0) return;
                
                isPaused = !isPaused;
                if (isPaused) {
                    pauseBtn.innerHTML = '<i class="fas fa-play"></i> 继续轮播';
                    pauseBtn.classList.add('secondary');
                } else {
                    pauseBtn.innerHTML = '<i class="fas fa-pause"></i> 暂停轮播';
                    pauseBtn.classList.remove('secondary');
                }
            });
            
            prevBtn.addEventListener('click', function() {
                prevSlide();
                if (isPaused) {
                    // 如果暂停状态手动切换，重置计时器
                    startSlideshow();
                }
            });
            
            nextBtn.addEventListener('click', function() {
                nextSlide();
                if (isPaused) {
                    // 如果暂停状态手动切换，重置计时器
                    startSlideshow();
                }
            });
            
            shuffleBtn.addEventListener('click', function() {
                if (imageFiles.length === 0) return;
                
                shuffleSlides();
                currentSlide = 0;
                slides.forEach((slide, index) => {
                    slide.classList.remove('active');
                    if (index === 0) slide.classList.add('active');
                });
                updateImageInfo();
            });
            
            directoryInput.addEventListener('change', function(e) {
                if (e.target.files.length > 0) {
                    addDirectory(e.target.files);
                }
                
                // 重置input，允许再次选择相同目录
                e.target.value = '';
            });
            
            clearBtn.addEventListener('click', clearAllDirectories);
            
            panelToggle.addEventListener('click', toggleControlPanel);
            
            // 初始状态
            initSlideshow();
            updateTransitionTime();

            
           // document.querySelector('.directory-actions').appendChild(demoBtn);
        });
    </script>
</body>
</html>
