<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>全屏纯视频播放器</title>
    <!-- 引入 FontAwesome 图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    color: #fff;
    height: 100vh;
    overflow: hidden;
    position: relative;
}

/* 👈 升级：播放器主容器转换为 3x3 块的九宫格流式矩阵 */
.player-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    z-index: 1;
    position: relative; 
    flex-wrap: wrap; /* 允许视频自动换行排列 */
    background: #000;
}

/* 👈 升级：默认情况下，九宫格里的所有视频克隆背景体样式 */
.player-container video { 
    position: absolute;
    width: 33.333vw;   /* 背景格子依然保持三分之一 */
    height: 33.333vh;  
    object-fit: cover; /* 背景完全铺满格子 */
    opacity: 0.85;     /* 保持淡化不抢戏 */
    filter: blur(8px); /* 华丽的毛玻璃模糊 */
    transform: scale(1.05); 
    pointer-events: none; 
    z-index: 2;        /* 👈 关键：图层较低，老老实实当背景 */
}
.player-container video:nth-child(1) { left: 0; top: 0; }
.player-container video:nth-child(2) { left: 33.333vw; top: 0; }
.player-container video:nth-child(3) { left: 66.666vw; top: 0; }
.player-container video:nth-child(4) { left: 0; top: 33.333vh; }
/* 第 5 个是主视频，位置在中间（left: 33.333vw; top: 33.333vh;）但它会被下方选择器接管重写 */
.player-container video:nth-child(6) { left: 66.666vw; top: 33.333vh; }
.player-container video:nth-child(7) { left: 0; top: 66.666vh; }
.player-container video:nth-child(8) { left: 33.333vw; top: 66.666vh; }
.player-container video:nth-child(9) { left: 66.666vw; top: 66.666vh; }

/* 👈 核心特权：唯独让正中间的第 5 个视频（即主显示器）脱胎换骨 */
.player-container video:nth-child(5) {
    position: absolute !important;
    top: 0 !important;
    left: 0 !important;
    width: 100vw !important;  /* 👈 修改：强行恢复 100% 屏幕宽度 */
    height: 100vh !important; /* 👈 修改：强行恢复 100% 屏幕高度 */
    object-fit: contain !important; /* 👈 严格保持：等比例包含不裁剪，比例完美 */
    opacity: 1 !important;          /* 100% 亮度和清晰度呈现 */
    filter: none !important;        /* 移除毛玻璃模糊 */
    transform: none !important;     
    pointer-events: auto !important; 
    z-index: 3 !important;   /* 👈 关键：图层级别高于背景，完美压在环境光晕的最上方 */
}

/* 控制面板（大屏/桌面端基准样式） */
.control-panel {
    position: fixed;
    bottom: 0;
    left: 85%;
    transform: translateX(-50%); /* 居中定位 */
    background: rgba(20, 20, 35, 0.92);
    backdrop-filter: blur(10px);
    border-radius: 20px 20px 0 0;
    padding: 20px;
    width: 100%;
    max-width: 800px;
    z-index: 10;
    box-shadow: 0 -5px 25px rgba(0, 0, 0, 0.5);
    border-top: 1px solid rgba(255, 255, 255, 0.1);
    transition: transform 0.4s ease, opacity 0.4s ease, visibility 0.4s ease;
}

/* 桌面端折叠：保留居中并向下完全滑出屏幕 */
.control-panel.collapsed {
    transform: translateX(45%); 
    margin-bottom: 0;   
}

/* 顶部居中的半圆收纳把手 */
.panel-toggle {
    position: absolute;
    top: 50%;
    left: -20px;
    transform: translateX(-50%);
    width: 40px;
    height: 80px;
    background: rgba(20, 20, 35, 0.92);
    backdrop-filter: blur(10px);
    border-radius: 10px 0 0 10px;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    z-index: 11;
    border-top: 1px solid rgba(255, 255, 255, 0.1);
    border-left: 1px solid rgba(255, 255, 255, 0.1);
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
}

.panel-toggle i {
    font-size: 1.2rem;
    color: #4ecdc4;
    transition: transform 0.3s ease;
}

/* 桌面端折叠联动：箭头原地旋转 180 度指向上方 */
.control-panel.collapsed .panel-toggle i.fa-chevron-right {
    transform: rotate(180deg) !important;
}

.title {
    text-align: center;
    font-size: 1.6rem;
    margin-bottom: 15px;
    background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    padding: 0 40px; 
}

.settings {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 20px;
}

.setting-group {
    display: flex;
    flex-direction: column;
    min-width: 150px;
}

label {
    font-size: 0.9rem;
    margin-bottom: 8px;
    color: #a9a9c5;
    display: flex;
    align-items: center;
    gap: 8px;
}

select, input {
    padding: 10px 15px;
    border-radius: 8px;
    border: 1px solid #393953;
    background: #25253a;
    color: #fff;
    width: 100%;
}
select:focus, input:focus {
    outline: none;
    border-color: #4ecdc4;
}

.buttons {
    display: flex;
    justify-content: center;
    gap: 15px;
    flex-wrap: wrap;
    margin-bottom: 20px;
}

.btn {
    padding: 12px 25px;
    border: none;
    border-radius: 8px;
    background: linear-gradient(45deg, #ff6b6b, #ff8e53);
    color: white;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    font-size: 1rem;
    display: flex;
    align-items: center;
    gap: 8px;
    box-shadow: 0 4px 15px rgba(255, 107, 107, 0.3);
}
.btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(255, 107, 107, 0.5);
}

.btn.secondary {
    background: linear-gradient(45deg, #4ecdc4, #43cea2);
    box-shadow: 0 4px 15px rgba(78, 205, 196, 0.3);
}
.btn.secondary:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(78, 205, 196, 0.5);
}

.directory-manager {
    margin-top: 15px;
    background: rgba(25, 25, 40, 0.7);
    border-radius: 12px;
    padding: 15px;
}
.directory-manager h3 {
    margin-bottom: 15px;
    color: #4ecdc4;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 1.1rem;
}
.directory-list {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin-top: 10px;
}
.directory-actions {
    margin-top: 15px;
    display: flex;
    gap: 10px;
}

.file-input-wrapper {
    position: relative;
    overflow: hidden;
    display: inline-block;
    flex: 1;
}
.file-input-wrapper input[type=file] {
    position: absolute;
    left: 0;
    top: 0;
    opacity: 0;
    width: 100%;
    height: 100%;
    cursor: pointer;
}
.file-input-button {
    padding: 10px 15px;
    border-radius: 8px;
    background: #25253a;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    border: 1px dashed #4ecdc4;
    cursor: pointer;
    transition: all 0.3s;
}
.file-input-button:hover {
    background: rgba(78, 205, 196, 0.1);
}

/* 状态指示器（左上角浮动） */
.status {
    position: fixed;
    top: 20px;
    left: 20px;
    background: rgba(30, 30, 46, 0.9);
    backdrop-filter: blur(10px);
    border-radius: 10px;
    padding: 10px 15px;
    z-index: 20;
    box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
    border: 1px solid rgba(255, 255, 255, 0.1);
    display: flex;
    align-items: center;
    gap: 10px;
    transition: opacity 0.3s ease, visibility 0.3s ease;
}
.status-indicator {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #4ecdc4;
    box-shadow: 0 0 10px #4ecdc4;
}

/* 视频信息显示（左下角浮动） */
.video-info {
    position: fixed;
    bottom: 20px;
    left: 20px;
    background: rgba(30, 30, 46, 0.9);
    backdrop-filter: blur(10px);
    border-radius: 10px;
    padding: 12px;
    z-index: 20;
    box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
    border: 1px solid rgba(255, 255, 255, 0.1);
    font-size: 0.9rem;
    line-height: 1.5;
    transition: opacity 0.3s ease, visibility 0.3s ease, transform 0.4s ease;
}
.video-info.hidden { display: none; }

/* 桌面端防遮挡：面板展开时，信息栏自动往上弹起 360px */
.video-info.push-up {
    transform: translateY(-360px);
}

/* 全屏纯净模式下的消退规则与把手豁免 */
body.pure-mode .status,
body.pure-mode .video-info,
body.pure-mode .control-panel {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
}
body.pure-mode .panel-toggle {
    opacity: 1 !important;
    visibility: visible !important;
    pointer-events: auto !important;
}

/* =======================================================
   三、 👈 完美合并：响应式媒体查询（移动端/小屏幕适配）
   ======================================================= */
@media (max-width: 768px) {
    .control-panel {
        width: 100%;
        max-width: 100%; /* 强行铺满屏幕宽度 */
        border-radius: 0; /* 移除大圆角 */
        padding: 15px;
        left: 50%; /* 维持原有的居中参照线 */
    }
    
    /* 移动端折叠：融合原本的 -50% 水平居中，并向下完全收拢隐藏 */
    .control-panel.collapsed {
        transform: translateX(-50%) translateY(100%);
    }
    
    .panel-toggle {
        top: -35px;
        width: 70px;
        height: 35px;
    }
    
    .title {
        font-size: 1.3rem;
        padding: 0 30px;
    }
    
    .settings {
        flex-direction: column;
        align-items: center;
        gap: 15px;
    }
    
    .setting-group {
        width: 100%;
    }
    
    .buttons {
        flex-direction: column;
        gap: 8px; /* 加大按钮垂直缝隙，方便手指触控 */
    }
    
    .btn {
        width: 100%;
        justify-content: center;
        padding: 10px 15px; /* 稍微缩减按钮膨胀度适配屏幕 */
    }
    
    .directory-actions {
        flex-direction: column;
        gap: 8px;
    }

    /* 移动端特殊补充：手机屏幕矮，面板升起时，信息框必须弹得更高（500px）防止被重叠遮挡 */
    .video-info.push-up {
        transform: translateY(-500px);
    }
}

    </style>
</head>
<body>
    <!-- 全屏视频渲染载体 -->
    <div class="player-container" id="playerContainer">
    </div>
    
    <!-- 左上角：状态指示器（激活纯净模式时会跟随隐藏） -->
    <div class="status" id="statusContainer">
        <div class="status-indicator"></div>
        <span>已导入 <span id="videoCount">0</span> 个视频</span>
    </div>
    
    <!-- 左下角：视频信息显示（激活纯净模式时会跟随隐藏，展开面板时智能往上弹防遮挡） -->
    <div class="video-info" id="videoInfo"></div>
    
    <!-- 底部控制面板（完美融合您的霓虹色主题骨架） -->
    <div class="control-panel" id="controlPanel">
        <!-- 顶部居中的半圆收纳把手（提权修复版） -->
        <div class="panel-toggle" id="panelToggle" title="折叠/展开面板">
            <i class="fas fa-chevron-right"></i>
        </div>
        
        <h2 class="title"><i class="fas fa-video"></i> 视频播放器控制面板</h2>
        
        <div class="settings">
            <div class="setting-group">
                <label for="speedSelect"><i class="fas fa-bolt"></i> 播放倍速</label>
                <select id="speedSelect">
                    <option value="0.5">0.5x 慢速</option>
                    <option value="1.0" selected>1.0x 正常</option>
                    <option value="1.5">1.5x 加快</option>
                    <option value="2.0">2.0x 快速</option>
                </select>
            </div>
        </div>
        
        <div class="buttons">
            <button id="pauseBtn" class="btn">
                <i class="fas fa-pause"></i> 暂停播放
            </button>
            <button id="prevBtn" class="btn secondary">
                <i class="fas fa-arrow-left"></i> 上一张
            </button>
            <button id="nextBtn" class="btn secondary">
                <i class="fas fa-arrow-right"></i> 下一张
            </button>
            <button id="shuffleBtn" class="btn">
                <i class="fas fa-random"></i> 重新随机
            </button>
        </div>
        
        <div class="directory-manager">
            <h3><i class="fas fa-folder"></i> 视频列表管理</h3>
            <div class="directory-list" id="directoryList"></div>
            
            <div class="directory-actions">
                <div class="file-input-wrapper">
                    <div class="file-input-button">
                        <i class="fas fa-folder-plus"></i> 选择视频文件(可多选)
                    </div>
                    <input type="file" id="videoInput" accept="video/*" multiple>
                </div>
                
                <button id="clearBtn" class="btn secondary">
                    <i class="fas fa-trash-alt"></i> 清除所有
                </button>
            </div>
        </div>
    </div>

    <!-- 外部数据关联挂载 -->
    <script src="videos.js"></script>

    <script>
document.addEventListener('DOMContentLoaded', function() {
    // ==================== 1. DOM 元素获取 ====================
    const speedSelect = document.getElementById('speedSelect');
    const pauseBtn = document.getElementById('pauseBtn');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const shuffleBtn = document.getElementById('shuffleBtn');
    const videoInput = document.getElementById('videoInput');
    const clearBtn = document.getElementById('clearBtn');
    const videoCountElement = document.getElementById('videoCount');
    const controlPanel = document.getElementById('controlPanel');
    const panelToggle = document.getElementById('panelToggle');
    const videoInfo = document.getElementById('videoInfo');
    
    // ==================== 2. 核心状态变量 ====================
    let videoList = []; // 存储结构: { name, fileObj }
    let currentIndex = 0;
    let isPaused = false;
    let isMuted = true; // 现代浏览器政策：必须默认静音方能支持自动播放
    let currentBlobUrl = null;
    let isPanelCollapsed = false;
    // ==================== 3. 视频资源调度核心 ====================
    function playVideo(index) {
        if (videoList.length === 0) {
            resetPlayer();
            return;
        }

        // 循环边界保护
        if (index >= videoList.length) index = 0;
        if (index < 0) index = videoList.length - 1;
        currentIndex = index;

        // 1. 极其重要：清除上一个视频释放出的虚拟内存链接
        if (currentBlobUrl && currentBlobUrl.startsWith('blob:')) {
            URL.revokeObjectURL(currentBlobUrl);
        }

        const currentVideoData = videoList[currentIndex];
        
        // 🚨 核心修复：严密分离两套完全不同的资源解析路径，彻底斩断 URL.createObjectURL 报错
        if (currentVideoData.fileObj && currentVideoData.fileObj.isStaticPath) {
            // A 渠道：如果是页面打开时、由 Python 离线脚本刷出来的静态视频
            // 👈 修复核心：直接使用其自带的物理绝对路径，绝对不调 URL.createObjectURL
            currentBlobUrl = currentVideoData.fileObj.staticPath; 
        } else {
            // B 渠道：如果是用户后续点击网页按钮、多选动态上传的原生 File 对象
            // 👈 维持原样：必须通过原生内存转换
            currentBlobUrl = URL.createObjectURL(currentVideoData.fileObj); 
        }
        
        // 2. 核心大换血：清空原来的老载体，一口气循环克隆创建 9 个完全一样的视频节点！
        playerContainer.innerHTML = '';
        
        for (let i = 0; i < 9; i++) {
            const videoNode = document.createElement('video');
            videoNode.src = currentBlobUrl;
            videoNode.playsInline = true;
            videoNode.setAttribute('preload', 'auto');
            
            // 维持音轨状态与倍速
            videoNode.playbackRate = parseFloat(speedSelect.value);
            videoNode.muted = isMuted;

            // 【主母体绑定策略】：
            // 唯独为正中间的第 5 个视频（即索引为 4 的那个主画面）赋予灵魂
            if (i === 4) {
                videoNode.id = "mainVideo"; // 赋予原主视频 id，确保外部所有的主监听器依然能精确抓到它
                
                // 连播绑定：当且仅当主视频播完后，无缝切入下一首
                videoNode.addEventListener('ended', function() {
                    if (!isPaused) playVideo(currentIndex + 1);
                });
            } else {
                // 周围的 8 个小克隆体，在画面动起来的时候，为了防止声音重叠或加载错位，强制静音并跳过完结监听
                videoNode.muted = true;
            }

            // 塞入网页格子中
            playerContainer.appendChild(videoNode);
        }

        // 3. 联动机制实现：当主视频启动/暂停/调速时，号令周围 8 个分身动作完全一致！
        const allVideos = playerContainer.querySelectorAll('video');
        const primeVideo = document.getElementById('mainVideo');

        // 每当中间的主视频时间轴前进，强迫周围 8 个分身校对时间（防止由于帧率差异导致背景和中间画面错位）
        primeVideo.addEventListener('timeupdate', function() {
            allVideos.forEach(v => {
                if (v !== primeVideo && Math.abs(v.currentTime - primeVideo.currentTime) > 0.3) {
                    v.currentTime = primeVideo.currentTime;
                }
            });
        });

        // 4. 文字信息刷新呈现
        videoInfo.classList.remove('hidden');
        updateVideoText();

        // 5. 执行具体的总体播放动作
        if (!isPaused) {
            // 中间播，周围全部跟着一起启动
            allVideos.forEach(v => v.play().catch(() => {}));
        } else {
            allVideos.forEach(v => v.pause());
        }
    }

    // ==================== 4. 升级后的九宫格清空重置 ====================
    function resetPlayer() {
        if (currentBlobUrl) URL.revokeObjectURL(currentBlobUrl);
        currentBlobUrl = null;
        videoList = [];
        currentIndex = 0;
        playerContainer.innerHTML = ''; // 灰飞烟灭清除 9 个视频格子
        videoCountElement.textContent = "0";
        videoInfo.classList.add('hidden');
    }


    // ==================== 5. 提示信息动态刷新 ====================
    function updateVideoText() {
        if (videoList.length === 0) return;
        const fileName = videoList[currentIndex].name;
        const soundIcon = isMuted ? ' 🔇 (点击全屏屏幕可解锁声音)' : ' 🔊';
        videoInfo.innerHTML = `
            <div><i class="fas fa-play-circle"></i> 正在播放：${fileName}${soundIcon}</div>
            <div>当前位置：${currentIndex + 1} / ${videoList.length}</div>
        `;
    }

    // ==================== 6. 播放列表乱序洗牌 ====================
    function shuffleList() {
        if (videoList.length <= 1) return;
        
        // 锁定当前正在播放的目标对象
        const currentVideo = videoList[currentIndex];
        
        // 严密执行 Fisher-Yates 洗牌机制
        for (let i = videoList.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [videoList[i], videoList[j]] = [videoList[j], videoList[i]];
        }
        
        // 动态重置被打乱后的新索引，维持视频播放连续性
        currentIndex = videoList.indexOf(currentVideo);
        updateVideoText();
    }
    // ==================== 7. 全量核心事件监听绑定 ====================

    // 【智能核心】：视频自然播放结束，无缝触发下一曲自动装载
    // mainVideo.addEventListener('ended', function() {
    //     if (!isPaused) {
    //         playVideo(currentIndex + 1);
    //     }
    // });

    // 监听本地视频多选文件输入
    videoInput.addEventListener('change', function(e) {
        const files = e.target.files;
        if (files.length === 0) return;

        const isFirstLoad = videoList.length === 0;
        
        // 精准定位刚才在 HTML DOM 中新加的那个 id="directoryList" 容器
        const queueContainer = document.getElementById('directoryList');

        // 遍历提取选中的视频文件
        for (let i = 0; i < files.length; i++) {
            const file = files[i];
            
            // 为每一个视频文件创建一个唯一随机 ID，方便独立单删
            const videoId = 'vid_' + Date.now() + '_' + Math.floor(Math.random() * 1000);

            // 1. 推入核心数据池
            videoList.push({
                id: videoId,
                name: file.name,
                fileObj: file
            });

            // 2. 动态创建 DOM 标签，完全遵循您的代码格式要求
            const tag = document.createElement('div');
            tag.className = 'directory-tag';
            tag.innerHTML = `
                <span><i class="fas fa-file-video"></i> ${file.name}</span>
                <span class="remove" data-id="${videoId}"><i class="fas fa-times"></i></span>
            `;
            
            // 👈 顺理成章：直接 appendChild 塞进 DOM 列表框里
            if (queueContainer) {
                queueContainer.appendChild(tag);
            }

            // 3. 绑定单个红叉的精密单选删除动作
            tag.querySelector('.remove').addEventListener('click', function(event) {
                event.stopPropagation(); // 阻止冒泡
                removeSingleVideo(videoId, tag);
            });
        }

        videoCountElement.textContent = videoList.length;

        if (isFirstLoad) {
            playVideo(0);
        } else {
            updateVideoText();
        }
        e.target.value = '';
    });
    // 单选视频删除与播放器智能连带切换
    function removeSingleVideo(videoId, tagElement) {
        const currentPlayingVideo = videoList[currentIndex];
        const deletingIndex = videoList.findIndex(vid => vid.id === videoId);

        videoList = videoList.filter(vid => vid.id !== videoId);
        tagElement.remove(); // 抹除对应的 DOM 节点
        
        videoCountElement.textContent = videoList.length;

        if (videoList.length === 0) {
            resetPlayer();
            return;
        }

        if (currentPlayingVideo && currentPlayingVideo.id === videoId) {
            playVideo(deletingIndex); 
        } else {
            currentIndex = videoList.indexOf(currentPlayingVideo);
            updateVideoText();
        }
    }

    // 暂停 / 播放切换逻辑
    pauseBtn.addEventListener('click', function() {
        if (videoList.length === 0) return;
        isPaused = !isPaused;
        const allVideos = playerContainer.querySelectorAll('video');

        if (isPaused) {
            pauseBtn.innerHTML = '<i class="fas fa-play"></i> 继续播放';
            pauseBtn.classList.add('secondary');
            allVideos.forEach(v => v.pause()); // 全场一键暂停
        } else {
            pauseBtn.innerHTML = '<i class="fas fa-pause"></i> 暂停播放';
            pauseBtn.classList.remove('secondary');
            allVideos.forEach(v => v.play().catch(e => {})); // 全场一键起飞播放
        }
    });

    // 上一首、下一首、洗牌、清空控制
    prevBtn.addEventListener('click', () => playVideo(currentIndex - 1));
    nextBtn.addEventListener('click', () => playVideo(currentIndex + 1));
    shuffleBtn.addEventListener('click', shuffleList);
    clearBtn.addEventListener('click', resetPlayer);


    // 监听播放倍速选择框
    speedSelect.addEventListener('change', function() {
        const allVideos = playerContainer.querySelectorAll('video');
        allVideos.forEach(v => v.playbackRate = parseFloat(speedSelect.value)); // 全场一键调速
    });

    // 控制侧边栏手风琴展开与隐退
    panelToggle.addEventListener('click', function() {
        isPanelCollapsed = !isPanelCollapsed;
        controlPanel.classList.toggle('collapsed', isPanelCollapsed);
    });

    // 【解锁限制】：点击全屏非控制面板区，即可自由解锁静音/恢复声音状态
    document.getElementById('playerContainer').addEventListener('click', function() {
        if (videoList.length === 0) return;
        isMuted = !isMuted;
        
        // 唯独解锁中间主视频（id为mainVideo）的声音，其余8个始终保持静音
        const primeVideo = document.getElementById('mainVideo');
        if (primeVideo) {
            primeVideo.muted = isMuted;
        }
        updateVideoText();
    });

    // ==================== 8. 系统默认启动序列 ====================
    // (function() {
    //     isPanelCollapsed = true;
    //     controlPanel.classList.add('collapsed'); // 默认对齐隐藏控制台，获得无瑕疵全屏视野
    // })();
   
    (function() {
        isPanelCollapsed = false; // 保持右上角侧边栏面板常驻展开
        
        const queueContainer = document.getElementById('directoryList');
        
        if (typeof ALL_VIDEO_DATA !== 'undefined' && ALL_VIDEO_DATA.length > 0) {
            
            // 👈 核心优化点 1：声明一个高性能内存字符串缓冲池，代替繁重的 DOM 创建动作
            let htmlBuffer = "";

            ALL_VIDEO_DATA.forEach(videoItem => {
                const videoId = 'vid_py_' + Math.floor(Math.random() * 10000);
                
                // 将数据推入播放核心池（纯数据操作，速度极快，几万条也是微秒级）
                videoList.push({
                    id: videoId,
                    name: videoItem.name,
                    fileObj: { name: videoItem.name, isStaticPath: true, staticPath: videoItem.path }
                });

                // 👈 核心优化点 2：在内存中纯文字拼接 HTML，不惊动浏览器重绘
                htmlBuffer += `
                    <div class="directory-tag" id="${videoId}">
                        <span><i class="fas fa-file-video"></i> ${videoItem.name}</span>
                        <span class="remove" data-id="${videoId}"><i class="fas fa-times"></i></span>
                    </div>
                `;
            });

            // 👈 核心优化点 3：循环彻底结束后，一鼓作气一次性灌入网页，浏览器重绘压力直接降为 1 次！
            if (queueContainer) {
                queueContainer.innerHTML = htmlBuffer;

                // 👈 核心优化点 4：利用高级“事件委托机制”，把所有 × 的删除事件绑定到父容器上，避免产生几万个监听器导致内存泄漏
                queueContainer.addEventListener('click', function(event) {
                    // 顺着点击的节点往上找，看是不是点到了红叉（.remove）
                    const removeBtn = event.target.closest('.remove');
                    if (removeBtn) {
                        event.stopPropagation();
                        const videoId = removeBtn.getAttribute('data-id');
                        const tagElement = document.getElementById(videoId);
                        if (tagElement) {
                            removeSingleVideo(videoId, tagElement);
                        }
                    }
                });
            }

            // 同步刷新总数统计
            videoCountElement.textContent = videoList.length;

            // 5. 瞬间拉起首首自动无缝连播
            if (videoList.length > 0) {
                playVideo(0);
            }
        } else {
            console.log("⚠️ 未检测到视频数据库！请确保已经运行了 python refresh_videos.py 脚本。");
        }
    })();
});
</script>

</html>
